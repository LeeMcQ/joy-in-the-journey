name: Deploy
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Bible JSON files for offline support
          run: npm run download-bibles
          # This creates public/bibles/kjv.json and public/bibles/web.json
          # so they're included in the Vite build output

        - name: Build
        run: npm run build
        env:
          VITE_BASE: "/joy-in-the-journey/" 