<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Joy Journey" />
    <meta name="description" content="28 interactive Bible studies — The Joy in the Journey Series" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="Joy in the Journey — Bible Study Series" />
    <meta property="og:description" content="28 interactive Bible studies to deepen your walk with God" />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Code+Pro:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&display=swap"
      rel="stylesheet"
    />

    <title>Joy in the Journey</title>
  </head>
  <body class="bg-navy-800 text-white antialiased">
    <div id="root"></div>

    <!-- Inline critical: prevent FOUC on theme -->
    <script>
      try {
        const s = JSON.parse(localStorage.getItem('joy-journey-storage') || '{}');
        const t = s?.state?.settings?.theme || 'dark';
        document.documentElement.classList.add('theme-' + t);
      } catch(e) {}
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
